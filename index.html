<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script>
        function handleResponse(data) {
            if (data && data.url) {
                window.location.href = data.url;
            } else {
                document.body.innerText = "URLの取得に失敗しました。";
            }
        }

        function startRedirect() {
            const gasUrl = "https://script.google.com/macros/s/AKfycbwATn9kZ-6y4ZuyTz71aq0aCtTi_r9d1Y21-rFBe9g5C5-es8VUr6uEhuirRoM-SyTo/exec"; 
            const script = document.createElement('script');
            script.src = gasUrl + "?callback=handleResponse";
            document.head.appendChild(script);
        }

        window.onload = startRedirect;
    </script>
</head>
<body>
    <p>フォームへ移動しています。少々お待ちください...</p>
</body>
</html>
